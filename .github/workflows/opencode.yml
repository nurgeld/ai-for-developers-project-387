name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      github.actor != 'opencode-agent[bot]' &&
      github.event.sender.type != 'Bot' &&
      github.event.comment.user.type != 'Bot' &&
      (
        contains(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_CONFIG_CONTENT: >-
            {"permission":{"bash":"deny","seed-test-data":"deny","render-deploy-check":"deny","render_*":"deny","playwright_*":"deny","chrome-devtools_*":"deny"},"mcp":{"render":{"enabled":false},"playwright":{"enabled":false},"chrome-devtools":{"enabled":false}}}
        with:
          model: opencode/gpt-5.1-codex
