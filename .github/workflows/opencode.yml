name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_NAME: ${{ vars.RENDER_SERVICE_NAME }}
          RENDER_BASE_URL: ${{ vars.RENDER_BASE_URL }}
          OPENCODE_CONFIG_CONTENT: >-
            {"tools":{"bash":false,"seed-test-data":false,"render-deploy-check":false}}
        with:
          model: opencode/gpt-5.3-codex
          prompt: |
            Work only with the repository contents and the GitHub issue/PR context.

            This run is for issue/PR comment assistance.
            Do not execute local scripts, deployment checks, or any localhost-dependent actions.
            Provide explanation/analysis directly from repository and issue context.

            For issue and PR comments, focus on explanation, analysis, and repository-contained code changes only.
